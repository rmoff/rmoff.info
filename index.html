    <style>
      :root {
        --cream: #FAF8F5;
        --brown: #2D2926;
        --brown-light: #5c524d;
        --orange: #E8421E;
        --orange-soft: rgba(232, 66, 30, 0.08);
        --border: #e0dbd5;
        --card-bg: #ffffff;
        --shadow: 0 1px 3px rgba(45, 41, 38, 0.06), 0 1px 2px rgba(45, 41, 38, 0.04);
        --shadow-hover: 0 4px 12px rgba(45, 41, 38, 0.1), 0 2px 4px rgba(45, 41, 38, 0.06);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: 'DM Sans', -apple-system, sans-serif;
        background-color: var(--cream);
        color: var(--brown);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        -webkit-font-smoothing: antialiased;
      }

      /* Header */
      header {
        border-bottom: 3px solid var(--orange);
        padding: 1.25rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 960px;
        width: 100%;
        margin: 0 auto;
      }

      header h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      header h1 a {
        color: var(--brown);
        text-decoration: none;
      }

      nav a {
        color: var(--brown-light);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        margin-left: 1.5rem;
        transition: color 0.2s;
      }

      nav a:hover, nav a.active {
        color: var(--orange);
      }

      /* Hero */
      .hero {
        text-align: center;
        padding: 3rem 2rem 1.5rem;
        max-width: 960px;
        width: 100%;
        margin: 0 auto;
      }

      .avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 3px solid var(--border);
        margin-bottom: 1rem;
        transition: border-color 0.3s;
      }

      .avatar:hover {
        border-color: var(--orange);
      }

      .hero p {
        color: var(--brown-light);
        font-size: 1.05rem;
        max-width: 28em;
        margin: 0 auto;
        line-height: 1.5;
      }

      /* Sections */
      main {
        flex: 1;
        max-width: 960px;
        width: 100%;
        margin: 0 auto;
        padding: 0 2rem 3rem;
      }

      .section-label {
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--brown-light);
        margin-bottom: 0.75rem;
        padding-left: 0.25rem;
      }

      .link-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.625rem;
        margin-bottom: 2rem;
      }

      /* Link cards */
      .link-card {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 0.85rem 1rem;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        text-decoration: none;
        color: var(--brown);
        font-weight: 500;
        font-size: 0.92rem;
        transition: all 0.2s ease;
        box-shadow: var(--shadow);
      }

      .link-card:hover {
        border-color: var(--orange);
        box-shadow: var(--shadow-hover);
        transform: translateY(-1px);
        background: var(--orange-soft);
      }

      .link-card .icon {
        font-size: 1.2rem;
        width: 1.75rem;
        text-align: center;
        flex-shrink: 0;
        color: var(--brown-light);
      }

      .link-card.featured .icon {
        color: #fff;
      }

      .link-card .label {
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      /* Blog card - featured */
      .link-card.featured {
        background: var(--card-bg);
        color: var(--orange);
        border: 2px solid var(--orange);
        font-weight: 600;
        box-shadow: 0 0 12px rgba(232, 66, 30, 0.2), 0 0 24px rgba(232, 66, 30, 0.1);
      }

      .link-card.featured .icon {
        color: var(--orange);
      }

      .link-card.featured:hover {
        box-shadow: 0 0 16px rgba(232, 66, 30, 0.3), 0 0 32px rgba(232, 66, 30, 0.15);
        transform: translateY(-1px);
        background: var(--orange-soft);
      }

      /* Less active section */
      .link-grid.secondary .link-card {
        background: transparent;
        box-shadow: none;
        border-color: var(--border);
        color: var(--brown-light);
        font-size: 0.88rem;
      }

      .link-grid.secondary .link-card:hover {
        background: var(--orange-soft);
        border-color: var(--orange);
        color: var(--brown);
        box-shadow: none;
      }

      /* Footer */
      footer {
        border-top: 1px solid var(--border);
        padding: 1.5rem 2rem;
        text-align: center;
        color: var(--brown-light);
        font-size: 0.85rem;
        max-width: 960px;
        width: 100%;
        margin: 0 auto;
      }

      footer a {
        color: var(--orange);
        text-decoration: none;
        font-weight: 500;
      }

      footer a:hover {
        text-decoration: underline;
      }

      /* Responsive */
      @media (max-width: 700px) {
        .link-grid {
          grid-template-columns: 1fr;
        }

        header {
          flex-direction: column;
          gap: 0.75rem;
          text-align: center;
          padding: 1rem 1.5rem;
        }

        nav a { margin-left: 0; margin: 0 0.75rem; }

        .hero { padding: 2rem 1.5rem 1rem; }
        main { padding: 0 1.5rem 2rem; }
      }

      @media (min-width: 701px) and (max-width: 900px) {
        .link-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* Entrance animation */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .hero { animation: fadeUp 0.4s ease both; }

      .link-card {
        animation: fadeUp 0.35s ease both;
      }

      .link-grid:first-of-type .link-card:nth-child(1) { animation-delay: 0.05s; }
      .link-grid:first-of-type .link-card:nth-child(2) { animation-delay: 0.08s; }
      .link-grid:first-of-type .link-card:nth-child(3) { animation-delay: 0.11s; }
      .link-grid:first-of-type .link-card:nth-child(4) { animation-delay: 0.14s; }
      .link-grid:first-of-type .link-card:nth-child(5) { animation-delay: 0.17s; }
      .link-grid:first-of-type .link-card:nth-child(6) { animation-delay: 0.20s; }
      .link-grid:first-of-type .link-card:nth-child(7) { animation-delay: 0.23s; }
      .link-grid:first-of-type .link-card:nth-child(8) { animation-delay: 0.26s; }
      .link-grid:first-of-type .link-card:nth-child(9) { animation-delay: 0.29s; }
      .link-grid:first-of-type .link-card:nth-child(10) { animation-delay: 0.32s; }
    </style>
